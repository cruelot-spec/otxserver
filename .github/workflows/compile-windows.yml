name: Compile OTX2 for Windows

on:
  push:
    branches: [ otxserv2 ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: otxserv2
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Dependencies (Chocolatey)
        run: |
          choco install cmake ninja -y

      - name: Compile OTX2
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel

      - name: Upload Compiled EXE
        uses: actions/upload-artifact@v4
        with:
          name: OTX2-Windows-Compiled
          path: |
            build/Release/*.exe
            build/Release/*.dll
          retention-days: 30
